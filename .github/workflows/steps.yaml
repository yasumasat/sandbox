name: steps

on:
  workflow_dispatch:

jobs:
  multiple-steps:
    runs-on: ubuntu-latest
    steps:
      - name: First step
        id: step1
        run: echo "Running first step"
      - name: Second step
        id: step2
        env:
          STEP_INFO: "Second step info"
        run: |
          echo "Running second step"
          echo "Environment variable: $STEP_INFO"
      - name: Third step
        id: step3
        run: echo "Running third step"
      - name: Set multiple outputs
        id: set-values
        run: |
          echo "name=John Doe" >> $GITHUB_OUTPUT
          echo "age=30" >> $GITHUB_OUTPUT
          echo "location=Tokyo" >> $GITHUB_OUTPUT
      - name: Use multiple outputs
        run: |
          echo "Name: ${{ steps.set-values.outputs.name }}"
          echo "Age: ${{ steps.set-values.outputs.age }}"
          echo "Location: ${{ steps.set-values.outputs.location }}"
